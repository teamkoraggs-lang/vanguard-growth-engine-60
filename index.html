<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Branden Web Design | Professional Websites for Contractors & Trades</title>
    <meta name="description" content="We build fast, modern websites for contractors, HVAC, plumbers, and local businesses. Get more calls, more leads, and show up on Google. Let's grow your business online." />
    <meta name="keywords" content="web design agency, contractor websites, HVAC website design, plumber website, local business web design, small business websites, SEO web design" />
    <meta name="author" content="Branden Web Design" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://yourdomain.com/" />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com/" />
    <meta property="og:title" content="Branden Web Design | Websites That Get You More Customers" />
    <meta property="og:description" content="We build fast, professional websites for contractors, HVAC, plumbers, and local businesses. More leads. More calls. More growth." />
    <meta property="og:image" content="https://yourdomain.com/og-image.png" />
    <meta property="og:site_name" content="Branden Web Design" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@BrandenWebDesign" />
    <meta name="twitter:title" content="Branden Web Design | Websites That Get You More Customers" />
    <meta name="twitter:description" content="We build fast, professional websites for contractors, HVAC, plumbers, and local businesses. More leads. More calls. More growth." />
    <meta name="twitter:image" content="https://yourdomain.com/og-image.png" />

    <!-- Structured Data: Local Business (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Branden Web Design",
      "url": "https://yourdomain.com",
      "description": "Professional web design agency specializing in websites for contractors, HVAC companies, plumbers, and local businesses.",
      "founder": {
        "@type": "Person",
        "name": "Branden"
      },
      "serviceType": ["Web Design", "SEO", "Website Development"],
      "areaServed": {
        "@type": "Country",
        "name": "United States"
      },
      "sameAs": []
    }
    </script>

    <!-- Structured Data: WebSite (enables Google Sitelinks search) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Branden Web Design",
      "url": "https://yourdomain.com"
    }
    </script>

    <!-- Performance & Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />

    <!-- Favicon (replace with your own) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
